name: Matrix Test

on:
    workflow_dispatch:

jobs:
    mutli-test:
        runs-on: ${{matrix.os}}
        strategy:
            matrix:
                os: [ubuntu-latest, windows-latest]
                python-version: ['3.10', '3.11']
        steps:
            - name: Announce OS and Python
              run: echo "Running on ${{matrix.os}} with python version ${{matrix.python-version}}"
